<header class="bg-white border-b border-gray-200 sticky top-0 z-50">

  <!-- Top utility bar -->
  <div class="bg-gray-900 text-gray-300 text-xs hidden md:block">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-1.5 flex items-center justify-between">
      <div class="flex items-center gap-6">
        <a href="tel:" class="flex items-center gap-1.5 hover:text-white transition-colors">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
          <span id="header-phone">Contact Us</span>
        </a>
        <span class="flex items-center gap-1.5">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          Mon – Sat: 9am – 6pm
        </span>
      </div>
      <div class="flex items-center gap-5">
        <a href="/track-order" class="hover:text-white transition-colors">Track Order</a>
        <a href="/faq" class="hover:text-white transition-colors">FAQ</a>
        <a href="/account" class="hover:text-white transition-colors">My Account</a>
      </div>
    </div>
  </div>

  <!-- Main header -->
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16 gap-4">

      <!-- Logo -->
      <a href="/" class="flex items-center gap-2.5 shrink-0">
        <img
          id="RENTMY_STORE_LOGO"
          src=""
          alt="Store Logo"
          class="h-9 w-auto object-contain hidden"
          onerror="this.classList.add('hidden')"
          onload="this.classList.remove('hidden'); document.getElementById('default-logo-text').classList.add('hidden')"
        >
        <span id="default-logo-text" class="text-xl font-black tracking-tight text-gray-900">RentStore</span>
      </a>

      <!-- Search (desktop) -->
      <div class="flex-1 max-w-lg hidden md:flex">
        <div class="relative w-full">
          <input
            type="text"
            placeholder="Search for items to rent..."
            class="w-full border border-gray-300 rounded-xl pl-4 pr-10 py-2.5 text-sm text-gray-800 placeholder-gray-400 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors bg-gray-50"
          >
          <button class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-indigo-600 transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
          </button>
        </div>
      </div>

      <!-- Desktop nav -->
      <nav class="hidden lg:flex items-center gap-1">
        <a href="/" class="px-3 py-2 text-sm font-medium text-gray-600 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg transition-all">Home</a>
        <div class="relative group">
          <button class="px-3 py-2 text-sm font-medium text-gray-600 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg transition-all flex items-center gap-1">
            Categories
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
          </button>
          <div class="absolute top-full left-0 mt-1 w-56 bg-white rounded-xl shadow-lg border border-gray-100 py-2 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all z-50">
            <a href="/products" class="block px-4 py-2.5 text-sm text-gray-600 hover:text-indigo-600 hover:bg-indigo-50">All Products</a>
            <div class="h-px bg-gray-100 my-1"></div>
            <a href="/products?category=daily" class="block px-4 py-2.5 text-sm text-gray-600 hover:text-indigo-600 hover:bg-indigo-50">Daily Rentals</a>
            <a href="/products?category=weekly" class="block px-4 py-2.5 text-sm text-gray-600 hover:text-indigo-600 hover:bg-indigo-50">Weekly Rentals</a>
            <a href="/products?category=monthly" class="block px-4 py-2.5 text-sm text-gray-600 hover:text-indigo-600 hover:bg-indigo-50">Monthly Rentals</a>
            <div class="h-px bg-gray-100 my-1"></div>
            <a href="/packages" class="block px-4 py-2.5 text-sm text-gray-600 hover:text-indigo-600 hover:bg-indigo-50">Packages & Bundles</a>
          </div>
        </div>
        <a href="/products" class="px-3 py-2 text-sm font-medium text-gray-600 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg transition-all">Products</a>
        <a href="/how-it-works" class="px-3 py-2 text-sm font-medium text-gray-600 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg transition-all">How It Works</a>
        <a href="/contact" class="px-3 py-2 text-sm font-medium text-gray-600 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg transition-all">Contact</a>
      </nav>

      <!-- Icon actions -->
      <div class="flex items-center gap-1 shrink-0">
        <!-- Mobile search toggle -->
        <button
          onclick="document.getElementById('default-mobile-search').classList.toggle('hidden')"
          class="md:hidden p-2 text-gray-500 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg transition-all"
          aria-label="Search"
        >
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
        </button>

        <!-- Wishlist -->
        <a href="/wishlist" class="hidden sm:flex p-2 text-gray-500 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg transition-all" aria-label="Wishlist">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
        </a>

        <!-- Account -->
        <a href="/account" class="p-2 text-gray-500 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg transition-all" aria-label="Account">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
        </a>

        <!-- Cart -->
        <a href="/cart" class="relative p-2 text-gray-500 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg transition-all" aria-label="Cart">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
          <span id="cart-count" class="absolute -top-0.5 -right-0.5 w-4 h-4 bg-indigo-600 text-white text-[9px] font-bold rounded-full flex items-center justify-center">0</span>
        </a>

        <!-- Book now (desktop) -->
        <a href="/products" class="hidden md:inline-flex items-center gap-1.5 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold px-4 py-2 rounded-xl transition-colors ml-1">
          Book Now
        </a>

        <!-- Mobile menu toggle -->
        <button
          onclick="document.getElementById('default-mobile-menu').classList.toggle('hidden')"
          class="lg:hidden p-2 text-gray-500 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg transition-all ml-1"
          aria-label="Menu"
        >
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Mobile search -->
  <div id="default-mobile-search" class="hidden md:hidden border-t border-gray-100 bg-white px-4 py-3">
    <div class="relative">
      <input type="text" placeholder="Search for items to rent..." class="w-full border border-gray-300 rounded-xl pl-4 pr-10 py-2.5 text-sm text-gray-800 placeholder-gray-400 focus:outline-none focus:border-indigo-500 bg-gray-50">
      <button class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
      </button>
    </div>
  </div>

  <!-- Mobile menu -->
  <div id="default-mobile-menu" class="hidden lg:hidden border-t border-gray-100 bg-white">
    <div class="px-4 py-4 space-y-1">
      <a href="/" class="block px-3 py-2.5 text-sm font-medium text-gray-700 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg">Home</a>
      <a href="/products" class="block px-3 py-2.5 text-sm font-medium text-gray-700 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg">Products</a>
      <a href="/packages" class="block px-3 py-2.5 text-sm font-medium text-gray-700 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg">Packages</a>
      <a href="/how-it-works" class="block px-3 py-2.5 text-sm font-medium text-gray-700 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg">How It Works</a>
      <a href="/contact" class="block px-3 py-2.5 text-sm font-medium text-gray-700 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg">Contact</a>
      <a href="/account" class="block px-3 py-2.5 text-sm font-medium text-gray-700 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg">My Account</a>
      <div class="pt-2">
        <a href="/products" class="block text-center bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold px-4 py-2.5 rounded-xl transition-colors">Book Now</a>
      </div>
    </div>
  </div>

</header>
