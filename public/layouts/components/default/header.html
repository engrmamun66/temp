<style>
  /* hide widget-injected bare text count next to cart icon */
  .RentMyMiniCart > [iconarea] + *:not([rentmyminicartcontents]),
  .RentMyMiniCart > span,
  .RentMyMiniCart > .count { display: none !important; }
</style>

<header id="rentmy-header" class="bg-[var(--brand-secondary)] text-[var(--brand-primary-text)] sticky top-0 z-50">
  <!-- Seasonal banner -->
  <div class="bg-[var(--brand-primary)] text-[var(--brand-primary-text)] text-xs text-center py-1.5 font-medium opacity-90">
    🌲 Summer season open — Yosemite & Yellowstone gear now available
  </div>

  <!-- Main nav -->
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16">

      <!-- Logo -->
      <a href="/" class="flex items-center gap-3">
        <img data-selector="RENTMY_STORE_LOGO" src="" alt="Logo" class="h-8 object-contain hidden" onerror="this.classList.add('hidden')">
      </a>

      <!-- Desktop nav -->
      <nav id="rentmy-header-nav" class="hidden md:flex items-center gap-1"></nav>

      <!-- Actions -->
      <div class="flex items-center gap-2">

        <!-- Cart -->
        <a class="rm-cart-bar RentMyMiniCart relative inline-flex items-center cursor-pointer p-2 text-white/60 hover:text-white hover:bg-[var(--brand-secondary-mid)] rounded-lg transition-all">
          <div class="relative" IconArea>
              <iconify-icon icon="mdi:cart-outline" width="24" height="24" class="text-white"></iconify-icon>
              <div class="absolute -top-1.5 -right-1.5 bg-red-500 text-white text-[10px] font-bold rounded-full min-w-[18px] h-[18px] flex items-center justify-center px-0.5 leading-none"><span TotalQuantity>0</span></div>
          </div>
          <div class="absolute right-0 top-full mt-2 w-80 bg-white rounded-xl shadow-2xl z-50" RentMyMiniCartContents></div>
        </a>

        <!-- Wishlist counter (widget-managed) -->
        <a href="/wish-list" class="rm-cart-bar RentMyWishlistCounter relative inline-flex items-center cursor-pointer p-2 text-white/60 hover:text-white hover:bg-[var(--brand-secondary-mid)] rounded-lg transition-all">
          <div class="relative" iconarea="">
            <iconify-icon icon="mdi:heart-outline" width="24" height="24" class="text-white"></iconify-icon>
            <div class="absolute -top-1.5 -right-1.5 bg-[var(--brand-primary)] text-white text-[10px] font-bold rounded-full min-w-[18px] h-[18px] flex items-center justify-center px-0.5 leading-none"><span totalquantity="">0</span></div>
          </div>
        </a>

        <!-- Shop Now CTA -->
        <a href="/products-list" class="hidden md:inline-flex items-center gap-1.5 bg-[var(--brand-primary)] hover:bg-[var(--brand-primary-dark)] text-[var(--brand-primary-text)] text-sm font-semibold px-4 py-2 rounded-xl transition-colors">
          Shop Now
        </a>

        <!-- Mobile menu toggle -->
        <button onclick="document.getElementById('camping-mobile-menu').classList.toggle('hidden')" class="md:hidden p-2 rounded-lg text-white/60 hover:text-white hover:bg-[var(--brand-secondary-mid)]">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Mobile menu -->
  <div id="camping-mobile-menu" class="hidden md:hidden border-t border-[var(--brand-secondary-mid)]">
    <div id="rentmy-mobile-nav" class="px-4 py-4 space-y-1"></div>
  </div>
</header>

<style>
  .rsk-nav-dropdown-menu {
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.15s ease, visibility 0.15s ease;
  }
  .rsk-nav-dropdown:hover .rsk-nav-dropdown-menu {
    opacity: 1;
    visibility: visible;
  }
</style>

<script>
(function () {
  var stateEl = document.querySelector('script#header_footer_nav_data');
  if (!stateEl || typeof Vue === 'undefined') return;

  var navData = JSON.parse(stateEl.textContent || '{}');
  var links = navData.headerLinks || [];

  function href(url) { return url ? '/' + url.replace(/^\/+/, '') : '/'; }

  var LINK_CLS         = 'px-4 py-2 text-sm text-white/70 hover:text-white hover:bg-[var(--brand-secondary-mid)] rounded-lg transition-all';
  var CHILD_CLS        = 'block px-4 py-2 text-sm text-white/70 hover:text-white hover:bg-[var(--brand-secondary-mid)]';
  var MOBILE_CLS       = 'block px-3 py-2 text-sm text-white/70 hover:text-white hover:bg-[var(--brand-secondary-mid)] rounded-lg';
  var MOBILE_CHILD_CLS = 'block px-6 py-1.5 text-sm text-white/50 hover:text-white hover:bg-[var(--brand-secondary-mid)] rounded-lg';
  var DOWN_ARROW       = '<svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>';

  // Desktop nav
  var desktopEl = document.getElementById('rentmy-header-nav');
  if (desktopEl) {
    Vue.createApp({
      data: function () { return { links: links }; },
      methods: { href: href },
      template:
        '<template v-for="link in links" :key="link.id">' +
          '<div v-if="link.children && link.children.length" class="rsk-nav-dropdown relative">' +
            '<a :href="href(link.content_url)" class="' + LINK_CLS + ' flex items-center gap-1">' +
              '<span>{{ link.label }}</span>' + DOWN_ARROW +
            '</a>' +
            '<div class="rsk-nav-dropdown-menu absolute top-full left-0 mt-1 w-52 bg-[var(--brand-secondary)] border border-[var(--brand-secondary-mid)] rounded-xl shadow-xl py-2 z-50">' +
              '<a v-for="child in link.children" :key="child.id" :href="href(child.content_url)" class="' + CHILD_CLS + '">{{ child.label }}</a>' +
            '</div>' +
          '</div>' +
          '<a v-else :href="href(link.content_url)" class="' + LINK_CLS + '">{{ link.label }}</a>' +
        '</template>',
    }).mount(desktopEl);
  }

  // Mobile nav
  var mobileEl = document.getElementById('rentmy-mobile-nav');
  if (mobileEl) {
    Vue.createApp({
      data: function () { return { links: links }; },
      methods: { href: href },
      template:
        '<template v-for="link in links" :key="link.id">' +
          '<a :href="href(link.content_url)" class="' + MOBILE_CLS + '">{{ link.label }}</a>' +
          '<template v-if="link.children && link.children.length">' +
            '<a v-for="child in link.children" :key="child.id" :href="href(child.content_url)" class="' + MOBILE_CHILD_CLS + '">{{ child.label }}</a>' +
          '</template>' +
        '</template>',
    }).mount(mobileEl);
  }
})();
</script>
