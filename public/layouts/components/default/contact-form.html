<section class="py-16 px-4 bg-gray-50">
  <div class="max-w-2xl mx-auto">
    <div class="text-center mb-10">
      <h2 class="text-3xl font-bold text-gray-800">Get in Touch</h2>
      <p class="text-gray-500 mt-2">We'd love to hear from you. Fill out the form and we'll get back to you shortly.</p>
    </div>

    <div class="bg-white rounded-2xl shadow-md p-8 md:p-10">
      <form action="#" method="POST" class="space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label for="contact-name" class="block text-sm font-medium text-gray-700 mb-1">Name</label>
            <input
              type="text"
              id="contact-name"
              name="name"
              placeholder="Your full name"
              class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
            >
          </div>
          <div>
            <label for="contact-email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
            <input
              type="email"
              id="contact-email"
              name="email"
              placeholder="you@example.com"
              class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
            >
          </div>
        </div>

        <div>
          <label for="contact-subject" class="block text-sm font-medium text-gray-700 mb-1">Subject</label>
          <input
            type="text"
            id="contact-subject"
            name="subject"
            placeholder="How can we help?"
            class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
          >
        </div>

        <div>
          <label for="contact-message" class="block text-sm font-medium text-gray-700 mb-1">Message</label>
          <textarea
            id="contact-message"
            name="message"
            rows="5"
            placeholder="Tell us more about your inquiry..."
            class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition resize-none"
          ></textarea>
        </div>

        <div class="text-right">
          <button
            type="submit"
            class="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-8 py-3 rounded-lg transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2"
          >
            Send Message
          </button>
        </div>
      </form>
    </div>
  </div>
</section>
