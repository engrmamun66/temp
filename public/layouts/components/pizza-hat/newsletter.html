<section class="bg-red-600 py-14 px-4">
  <div class="max-w-4xl mx-auto flex flex-col md:flex-row items-center justify-between gap-8">

    <!-- Text block -->
    <div class="text-center md:text-left">
      <p class="text-red-200 text-sm font-bold uppercase tracking-widest mb-2">Newsletter</p>
      <h2 class="text-2xl md:text-3xl font-extrabold text-white leading-snug">
        Hot deals delivered<br class="hidden md:block"> to your inbox
      </h2>
      <p class="text-red-100 mt-2 text-sm">Exclusive discounts, new gear alerts, and catering tips. Fresh every week.</p>
    </div>

    <!-- Form -->
    <form class="w-full md:w-auto flex flex-col sm:flex-row gap-3 min-w-[320px]">
      <input
        type="email"
        placeholder="Enter your email address"
        class="flex-1 px-5 py-3 rounded-lg text-stone-700 placeholder-stone-400 focus:outline-none focus:ring-2 focus:ring-amber-400 bg-white text-sm"
      >
      <button
        type="submit"
        class="bg-amber-400 hover:bg-amber-300 text-red-900 font-bold px-6 py-3 rounded-lg transition-colors duration-200 whitespace-nowrap text-sm shadow-md">
        Subscribe
      </button>
    </form>

  </div>
</section>
