<section class="bg-amber-50 py-16 px-4">
  <div class="max-w-2xl mx-auto">

    <!-- Header -->
    <div class="text-center mb-10">
      <span class="inline-block bg-red-100 text-red-600 text-xs font-bold uppercase tracking-widest px-3 py-1 rounded-full mb-3">Contact Us</span>
      <h2 class="text-3xl md:text-4xl font-extrabold text-stone-800">Get in Touch</h2>
      <p class="text-stone-500 mt-3">Questions about catering gear? We'll get back to you faster than a pizza delivery.</p>
    </div>

    <!-- Card -->
    <div class="bg-amber-100 rounded-2xl border border-amber-200 shadow-md shadow-amber-100 p-8 md:p-10">
      <form class="space-y-5">

        <!-- Name + Email -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
          <div>
            <label class="block text-sm font-semibold text-stone-700 mb-1.5">Full Name</label>
            <input type="text" placeholder="Mario Rossi"
              class="w-full border border-amber-300 bg-white rounded-lg px-4 py-2.5 text-stone-700 placeholder-stone-400 focus:outline-none focus:ring-2 focus:ring-red-400 focus:border-transparent transition">
          </div>
          <div>
            <label class="block text-sm font-semibold text-stone-700 mb-1.5">Email Address</label>
            <input type="email" placeholder="mario@pizzahat.com"
              class="w-full border border-amber-300 bg-white rounded-lg px-4 py-2.5 text-stone-700 placeholder-stone-400 focus:outline-none focus:ring-2 focus:ring-red-400 focus:border-transparent transition">
          </div>
        </div>

        <!-- Phone -->
        <div>
          <label class="block text-sm font-semibold text-stone-700 mb-1.5">Phone Number</label>
          <input type="tel" placeholder="+1 (555) 000-0000"
            class="w-full border border-amber-300 bg-white rounded-lg px-4 py-2.5 text-stone-700 placeholder-stone-400 focus:outline-none focus:ring-2 focus:ring-red-400 focus:border-transparent transition">
        </div>

        <!-- Message -->
        <div>
          <label class="block text-sm font-semibold text-stone-700 mb-1.5">Message</label>
          <textarea rows="4" placeholder="Tell us about your event, equipment needs, or rental duration..."
            class="w-full border border-amber-300 bg-white rounded-lg px-4 py-2.5 text-stone-700 placeholder-stone-400 focus:outline-none focus:ring-2 focus:ring-red-400 focus:border-transparent transition resize-none"></textarea>
        </div>

        <!-- Submit -->
        <div class="pt-2">
          <button type="submit"
            class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded-xl shadow transition-colors duration-200 tracking-wide text-sm uppercase">
            Send Message
          </button>
        </div>

      </form>
    </div>

  </div>
</section>
