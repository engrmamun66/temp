<section class="py-16 px-4 bg-stone-100">
  <div class="max-w-2xl mx-auto">
    <div class="text-center mb-10">
      <h2 class="text-3xl font-bold text-stone-800">Plan Your Trip</h2>
      <p class="text-stone-500 mt-2">Have a question about gear or availability? Reach out and we'll help you prepare.</p>
    </div>

    <div class="bg-white rounded-2xl shadow-md p-8 md:p-10 border border-stone-200">
      <form action="#" method="POST" class="space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label for="camp-contact-name" class="block text-sm font-medium text-stone-700 mb-1">Name</label>
            <input
              type="text"
              id="camp-contact-name"
              name="name"
              placeholder="Your full name"
              class="w-full border border-stone-300 rounded-lg px-4 py-2.5 text-stone-800 placeholder-stone-400 focus:outline-none focus:ring-2 focus:ring-green-600 focus:border-transparent transition"
            >
          </div>
          <div>
            <label for="camp-contact-email" class="block text-sm font-medium text-stone-700 mb-1">Email</label>
            <input
              type="email"
              id="camp-contact-email"
              name="email"
              placeholder="you@example.com"
              class="w-full border border-stone-300 rounded-lg px-4 py-2.5 text-stone-800 placeholder-stone-400 focus:outline-none focus:ring-2 focus:ring-green-600 focus:border-transparent transition"
            >
          </div>
        </div>

        <div>
          <label for="camp-contact-subject" class="block text-sm font-medium text-stone-700 mb-1">Subject</label>
          <input
            type="text"
            id="camp-contact-subject"
            name="subject"
            placeholder="e.g. Weekend camping trip gear"
            class="w-full border border-stone-300 rounded-lg px-4 py-2.5 text-stone-800 placeholder-stone-400 focus:outline-none focus:ring-2 focus:ring-green-600 focus:border-transparent transition"
          >
        </div>

        <div>
          <label for="camp-contact-message" class="block text-sm font-medium text-stone-700 mb-1">Message</label>
          <textarea
            id="camp-contact-message"
            name="message"
            rows="5"
            placeholder="Tell us about your adventure plans..."
            class="w-full border border-stone-300 rounded-lg px-4 py-2.5 text-stone-800 placeholder-stone-400 focus:outline-none focus:ring-2 focus:ring-green-600 focus:border-transparent transition resize-none"
          ></textarea>
        </div>

        <div class="text-right">
          <button
            type="submit"
            class="bg-green-700 hover:bg-green-600 text-white font-semibold px-8 py-3 rounded-lg transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-green-600 focus:ring-offset-2"
          >
            Send Message
          </button>
        </div>
      </form>
    </div>
  </div>
</section>
