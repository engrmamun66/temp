<header id="rentmy-header" class="bg-stone-900 text-white sticky top-0 z-50">
  <!-- Seasonal banner -->
  <div class="bg-green-800 text-green-100 text-xs text-center py-1.5 font-medium">
    🌲 Summer season open — Yosemite & Yellowstone gear now available
  </div>

  <!-- Main nav -->
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16">

      <!-- Logo -->
      <a href="/" class="flex items-center gap-3">
        <img data-selector="RENTMY_STORE_LOGO" src="" alt="Logo" class="h-8 object-contain hidden" onerror="this.classList.add('hidden')">
        <div>
          <span class="block text-base font-bold leading-none tracking-wide">WildNest</span>
          <span class="block text-[9px] text-green-400 tracking-widest uppercase leading-none mt-0.5">Gear & Adventures</span>
        </div>
      </a>

      <!-- Desktop nav -->
      <nav id="rentmy-header-nav" class="hidden md:flex items-center gap-1"></nav>

      <!-- Actions -->
      <div class="flex items-center gap-2">
        <button class="hidden md:flex p-2 text-stone-300 hover:text-white hover:bg-stone-800 rounded-lg transition-all" aria-label="Search">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
        </button>
        <a href="/wishlist" class="hidden sm:flex p-2 text-stone-300 hover:text-white hover:bg-stone-800 rounded-lg transition-all" aria-label="Wishlist">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
        </a>
        <a href="/products-list" class="hidden md:inline-flex items-center gap-1.5 bg-green-700 hover:bg-green-600 text-white text-sm font-semibold px-4 py-2 rounded-xl transition-colors">
          Shop Now
        </a>
        <button onclick="document.getElementById('camping-mobile-menu').classList.toggle('hidden')" class="md:hidden p-2 rounded-lg text-stone-300 hover:bg-stone-800">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Mobile menu -->
  <div id="camping-mobile-menu" class="hidden md:hidden border-t border-stone-800">
    <div id="rentmy-mobile-nav" class="px-4 py-4 space-y-1"></div>
  </div>
</header>

<style>
  .rsk-nav-dropdown-menu {
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.15s ease, visibility 0.15s ease;
  }
  .rsk-nav-dropdown:hover .rsk-nav-dropdown-menu {
    opacity: 1;
    visibility: visible;
  }
</style>

<script>
(function () {
  var stateEl = document.querySelector('script#header_footer_nav_data');
  if (!stateEl || typeof Vue === 'undefined') return;

  var navData = JSON.parse(stateEl.textContent || '{}');
  var links = navData.headerLinks || [];

  function href(url) { return url ? '/' + url.replace(/^\/+/, '') : '/'; }

  var LINK_CLS        = 'px-4 py-2 text-sm text-stone-300 hover:text-white hover:bg-stone-800 rounded-lg transition-all';
  var CHILD_CLS       = 'block px-4 py-2 text-sm text-stone-300 hover:text-white hover:bg-stone-800';
  var MOBILE_CLS      = 'block px-3 py-2 text-sm text-stone-300 hover:text-white hover:bg-stone-800 rounded-lg';
  var MOBILE_CHILD_CLS = 'block px-6 py-1.5 text-sm text-stone-400 hover:text-white hover:bg-stone-800 rounded-lg';
  var DOWN_ARROW      = '<svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>';

  // Desktop nav
  var desktopEl = document.getElementById('rentmy-header-nav');
  if (desktopEl) {
    Vue.createApp({
      data: function () { return { links: links }; },
      methods: { href: href },
      template:
        '<template v-for="link in links" :key="link.id">' +
          '<div v-if="link.children && link.children.length" class="rsk-nav-dropdown relative">' +
            '<button class="' + LINK_CLS + ' flex items-center gap-1">' +
              '<span>{{ link.label }}</span>' + DOWN_ARROW +
            '</button>' +
            '<div class="rsk-nav-dropdown-menu absolute top-full left-0 mt-1 w-52 bg-stone-900 border border-stone-700 rounded-xl shadow-xl py-2 z-50">' +
              '<a v-for="child in link.children" :key="child.id" :href="href(child.content_url)" class="' + CHILD_CLS + '">{{ child.label }}</a>' +
            '</div>' +
          '</div>' +
          '<a v-else :href="href(link.content_url)" class="' + LINK_CLS + '">{{ link.label }}</a>' +
        '</template>',
    }).mount(desktopEl);
  }

  // Mobile nav
  var mobileEl = document.getElementById('rentmy-mobile-nav');
  if (mobileEl) {
    Vue.createApp({
      data: function () { return { links: links }; },
      methods: { href: href },
      template:
        '<template v-for="link in links" :key="link.id">' +
          '<a :href="href(link.content_url)" class="' + MOBILE_CLS + '">{{ link.label }}</a>' +
          '<template v-if="link.children && link.children.length">' +
            '<a v-for="child in link.children" :key="child.id" :href="href(child.content_url)" class="' + MOBILE_CHILD_CLS + '">{{ child.label }}</a>' +
          '</template>' +
        '</template>',
    }).mount(mobileEl);
  }
})();
</script>
