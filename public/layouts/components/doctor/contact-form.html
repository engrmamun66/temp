<section class="bg-gray-50 py-16 px-4">
  <div class="max-w-2xl mx-auto">

    <!-- Header -->
    <div class="text-center mb-10">
      <span class="inline-block bg-teal-100 text-teal-700 text-xs font-semibold uppercase tracking-widest px-3 py-1 rounded-full mb-3">Appointments</span>
      <h2 class="text-3xl md:text-4xl font-bold text-slate-800">Book an Appointment</h2>
      <p class="text-slate-500 mt-3">Fill out the form and our team will confirm your booking within 24 hours.</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-md shadow-slate-200 border border-slate-100 p-8 md:p-10">
      <form class="space-y-5">

        <!-- Name + Email -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">Full Name</label>
            <input type="text" placeholder="Dr. Jane Smith"
              class="w-full border border-slate-200 rounded-lg px-4 py-2.5 text-slate-700 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-teal-400 focus:border-transparent transition">
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">Email Address</label>
            <input type="email" placeholder="jane@clinic.com"
              class="w-full border border-slate-200 rounded-lg px-4 py-2.5 text-slate-700 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-teal-400 focus:border-transparent transition">
          </div>
        </div>

        <!-- Phone + Department -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">Phone Number</label>
            <input type="tel" placeholder="+1 (555) 000-0000"
              class="w-full border border-slate-200 rounded-lg px-4 py-2.5 text-slate-700 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-teal-400 focus:border-transparent transition">
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">Department</label>
            <select class="w-full border border-slate-200 rounded-lg px-4 py-2.5 text-slate-700 focus:outline-none focus:ring-2 focus:ring-teal-400 focus:border-transparent transition bg-white appearance-none">
              <option value="" disabled selected>Select department</option>
              <option>General</option>
              <option>Cardiology</option>
              <option>Orthopedics</option>
              <option>Pediatrics</option>
            </select>
          </div>
        </div>

        <!-- Message -->
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">Message</label>
          <textarea rows="4" placeholder="Describe your equipment needs or appointment reason..."
            class="w-full border border-slate-200 rounded-lg px-4 py-2.5 text-slate-700 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-teal-400 focus:border-transparent transition resize-none"></textarea>
        </div>

        <!-- Submit -->
        <div class="pt-2">
          <button type="submit"
            class="w-full bg-teal-600 hover:bg-teal-700 text-white font-semibold py-3 rounded-lg shadow-sm transition-colors duration-200 tracking-wide">
            Book Appointment
          </button>
        </div>

      </form>
    </div>

  </div>
</section>
