<header class="bg-white shadow-sm sticky top-0 z-50">
  <!-- Top bar -->
  <div class="bg-blue-700 text-white text-xs hidden md:block">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-1.5 flex items-center justify-between">
      <div class="flex items-center gap-6">
        <span class="flex items-center gap-1.5">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
          123 Medical Center Drive, New York
        </span>
        <span class="flex items-center gap-1.5">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          Mon–Sat: 8am – 8pm
        </span>
      </div>
      <a href="tel:+18001234567" class="flex items-center gap-1.5 hover:text-blue-200 transition-colors font-medium">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
        Emergency: 1-800-123-4567
      </a>
    </div>
  </div>

  <!-- Main nav -->
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16">
      <!-- Logo -->
      <a href="/" class="flex items-center gap-2.5">
        <div class="w-9 h-9 bg-blue-600 rounded-xl flex items-center justify-center shadow-sm">
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/>
          </svg>
        </div>
        <img id="RENTMY_STORE_LOGO" src="" alt="Logo" class="h-8 object-contain hidden" onerror="this.classList.add('hidden')">
        <div>
          <span class="block text-lg font-bold text-blue-700 leading-none">MediCare</span>
          <span class="block text-[10px] text-gray-400 tracking-widest uppercase leading-none mt-0.5">Health & Wellness</span>
        </div>
      </a>

      <!-- Desktop nav -->
      <nav class="hidden md:flex items-center gap-1">
        <a href="/" class="px-4 py-2 text-sm font-medium text-gray-600 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition-all">Home</a>
        <div class="relative group">
          <button class="px-4 py-2 text-sm font-medium text-gray-600 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition-all flex items-center gap-1">
            Services
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
          </button>
          <div class="absolute top-full left-0 mt-1 w-52 bg-white rounded-xl shadow-lg border border-gray-100 py-2 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all">
            <a href="#" class="block px-4 py-2 text-sm text-gray-600 hover:text-blue-600 hover:bg-blue-50">General Checkup</a>
            <a href="#" class="block px-4 py-2 text-sm text-gray-600 hover:text-blue-600 hover:bg-blue-50">Specialist Consultation</a>
            <a href="#" class="block px-4 py-2 text-sm text-gray-600 hover:text-blue-600 hover:bg-blue-50">Diagnostics & Lab</a>
            <a href="#" class="block px-4 py-2 text-sm text-gray-600 hover:text-blue-600 hover:bg-blue-50">Physiotherapy</a>
            <a href="#" class="block px-4 py-2 text-sm text-gray-600 hover:text-blue-600 hover:bg-blue-50">Mental Health</a>
          </div>
        </div>
        <a href="/doctors" class="px-4 py-2 text-sm font-medium text-gray-600 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition-all">Doctors</a>
        <a href="/about" class="px-4 py-2 text-sm font-medium text-gray-600 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition-all">About</a>
        <a href="/contact" class="px-4 py-2 text-sm font-medium text-gray-600 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition-all">Contact</a>
      </nav>

      <!-- CTA + mobile toggle -->
      <div class="flex items-center gap-3">
        <a href="/book" class="hidden md:inline-flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold px-5 py-2.5 rounded-full shadow-sm transition-colors">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
          Book Appointment
        </a>
        <button onclick="document.getElementById('doctor-mobile-menu').classList.toggle('hidden')" class="md:hidden p-2 rounded-lg text-gray-500 hover:bg-gray-100">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Mobile menu -->
  <div id="doctor-mobile-menu" class="hidden md:hidden border-t border-gray-100 bg-white">
    <div class="px-4 py-4 space-y-1">
      <a href="/" class="block px-3 py-2 text-sm font-medium text-gray-700 hover:text-blue-600 hover:bg-blue-50 rounded-lg">Home</a>
      <a href="/services" class="block px-3 py-2 text-sm font-medium text-gray-700 hover:text-blue-600 hover:bg-blue-50 rounded-lg">Services</a>
      <a href="/doctors" class="block px-3 py-2 text-sm font-medium text-gray-700 hover:text-blue-600 hover:bg-blue-50 rounded-lg">Doctors</a>
      <a href="/about" class="block px-3 py-2 text-sm font-medium text-gray-700 hover:text-blue-600 hover:bg-blue-50 rounded-lg">About</a>
      <a href="/contact" class="block px-3 py-2 text-sm font-medium text-gray-700 hover:text-blue-600 hover:bg-blue-50 rounded-lg">Contact</a>
      <div class="pt-2">
        <a href="/book" class="block text-center bg-blue-600 text-white text-sm font-semibold px-4 py-2.5 rounded-full">Book Appointment</a>
      </div>
    </div>
  </div>
</header>
