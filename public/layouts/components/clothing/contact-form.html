<section class="bg-white py-20 px-4">
  <div class="max-w-xl mx-auto">

    <div class="mb-12">
      <span class="block text-xs font-semibold uppercase tracking-[0.25em] text-rose-500 mb-3">Reach Out</span>
      <h2 class="text-4xl font-black text-neutral-900 leading-tight">Contact Us</h2>
      <div class="mt-4 w-12 h-0.5 bg-neutral-900"></div>
    </div>

    <form class="space-y-6">

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
        <div>
          <label class="block text-xs font-semibold uppercase tracking-widest text-neutral-500 mb-2">Name</label>
          <input type="text" placeholder="Your name"
            class="w-full border-b border-neutral-200 focus:border-neutral-900 pb-2.5 text-neutral-900 placeholder-neutral-300 text-sm focus:outline-none transition-colors bg-transparent">
        </div>
        <div>
          <label class="block text-xs font-semibold uppercase tracking-widest text-neutral-500 mb-2">Email</label>
          <input type="email" placeholder="your@email.com"
            class="w-full border-b border-neutral-200 focus:border-neutral-900 pb-2.5 text-neutral-900 placeholder-neutral-300 text-sm focus:outline-none transition-colors bg-transparent">
        </div>
      </div>

      <div>
        <label class="block text-xs font-semibold uppercase tracking-widest text-neutral-500 mb-2">Subject</label>
        <input type="text" placeholder="How can we help?"
          class="w-full border-b border-neutral-200 focus:border-neutral-900 pb-2.5 text-neutral-900 placeholder-neutral-300 text-sm focus:outline-none transition-colors bg-transparent">
      </div>

      <div>
        <label class="block text-xs font-semibold uppercase tracking-widest text-neutral-500 mb-2">Message</label>
        <textarea rows="5" placeholder="Write your message here..."
          class="w-full border-b border-neutral-200 focus:border-neutral-900 pb-2.5 text-neutral-900 placeholder-neutral-300 text-sm focus:outline-none transition-colors bg-transparent resize-none"></textarea>
      </div>

      <div class="pt-2">
        <button type="submit"
          class="bg-neutral-900 hover:bg-neutral-700 text-white text-xs font-semibold uppercase tracking-[0.2em] px-10 py-4 transition-colors">
          Send Message
        </button>
      </div>

    </form>
  </div>
</section>
