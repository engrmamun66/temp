<section class="bg-slate-50 py-16 px-4">
  <div class="max-w-2xl mx-auto">

    <div class="text-center mb-10">
      <span class="inline-block bg-indigo-100 text-indigo-700 text-xs font-semibold uppercase tracking-widest px-3 py-1 rounded mb-4">Get in Touch</span>
      <h2 class="text-3xl font-bold text-slate-800">Request a Rental</h2>
      <p class="text-slate-500 mt-2">Tell us what you need and we'll get back to you within one business day.</p>
    </div>

    <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-8">
      <form class="space-y-5">

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">Full Name</label>
            <input type="text" placeholder="John Smith"
              class="w-full px-4 py-2.5 rounded-lg border border-slate-200 text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition text-sm">
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">Email Address</label>
            <input type="email" placeholder="john@example.com"
              class="w-full px-4 py-2.5 rounded-lg border border-slate-200 text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition text-sm">
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">Phone Number</label>
          <input type="tel" placeholder="+1 (555) 000-0000"
            class="w-full px-4 py-2.5 rounded-lg border border-slate-200 text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition text-sm">
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">Message</label>
          <textarea rows="5" placeholder="Describe what you'd like to rent, dates, and any special requirements..."
            class="w-full px-4 py-2.5 rounded-lg border border-slate-200 text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition text-sm resize-none"></textarea>
        </div>

        <button type="submit"
          class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-6 rounded-lg transition-colors text-sm tracking-wide">
          Submit Rental Request
        </button>

      </form>
    </div>

  </div>
</section>
