<header class="bg-slate-900 text-white sticky top-0 z-50 shadow-lg">
  <!-- Promo bar -->
  <div class="bg-orange-500 text-white text-xs text-center py-1.5 font-medium tracking-wide">
    🎉 First rental free — use code <strong>RENT1FREE</strong> at checkout
  </div>

  <!-- Main nav -->
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center gap-4 h-16">

      <!-- Logo -->
      <a href="/" class="flex items-center gap-2.5 shrink-0">
        <div class="w-9 h-9 bg-orange-500 rounded-lg flex items-center justify-center">
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
        </div>
        <img id="RENTMY_STORE_LOGO" src="" alt="Logo" class="h-7 object-contain hidden brightness-0 invert" onerror="this.classList.add('hidden')">
        <div class="hidden sm:block">
          <span class="block text-base font-bold leading-none">CartRent</span>
          <span class="block text-[9px] text-orange-400 tracking-widest uppercase leading-none mt-0.5">Rent anything, anytime</span>
        </div>
      </a>

      <!-- Search bar -->
      <div class="flex-1 max-w-xl hidden md:flex items-center">
        <div class="relative w-full">
          <input
            type="text"
            placeholder="Search for tools, cameras, bikes..."
            class="w-full bg-slate-800 border border-slate-700 rounded-xl pl-4 pr-10 py-2.5 text-sm text-white placeholder-slate-400 focus:outline-none focus:border-orange-500 transition-colors"
          >
          <button class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-orange-400 transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
          </button>
        </div>
      </div>

      <!-- Actions -->
      <div class="ml-auto flex items-center gap-1 sm:gap-2">
        <nav class="hidden lg:flex items-center gap-1">
          <a href="/categories" class="px-3 py-2 text-sm text-slate-300 hover:text-white hover:bg-slate-800 rounded-lg transition-all">Categories</a>
          <a href="/how-it-works" class="px-3 py-2 text-sm text-slate-300 hover:text-white hover:bg-slate-800 rounded-lg transition-all">How it works</a>
        </nav>
        <a href="/account" class="p-2 text-slate-300 hover:text-white hover:bg-slate-800 rounded-lg transition-all" aria-label="Account">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
        </a>
        <a href="/bookings" class="hidden sm:flex p-2 text-slate-300 hover:text-white hover:bg-slate-800 rounded-lg transition-all items-center gap-1.5 text-sm" aria-label="My Bookings">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
          <span class="hidden xl:inline">Bookings</span>
        </a>
        <a href="/cart" class="relative p-2 text-slate-300 hover:text-white hover:bg-slate-800 rounded-lg transition-all" aria-label="Cart">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
          <span class="absolute -top-0.5 -right-0.5 w-4 h-4 bg-orange-500 rounded-full text-[10px] font-bold flex items-center justify-center">3</span>
        </a>
        <a href="/list-item" class="hidden sm:inline-flex items-center gap-1.5 bg-orange-500 hover:bg-orange-600 text-white text-sm font-semibold px-4 py-2 rounded-xl transition-colors ml-1">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
          List Item
        </a>
        <button onclick="document.getElementById('cart-rent-mobile-menu').classList.toggle('hidden')" class="lg:hidden p-2 rounded-lg text-slate-300 hover:bg-slate-800">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
      </div>
    </div>

    <!-- Mobile search -->
    <div class="md:hidden pb-3">
      <div class="relative">
        <input type="text" placeholder="Search for rentals..." class="w-full bg-slate-800 border border-slate-700 rounded-xl pl-4 pr-10 py-2.5 text-sm text-white placeholder-slate-400 focus:outline-none focus:border-orange-500">
        <button class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Mobile menu -->
  <div id="cart-rent-mobile-menu" class="hidden lg:hidden border-t border-slate-800">
    <div class="px-4 py-4 space-y-1">
      <a href="/categories" class="block px-3 py-2 text-sm text-slate-300 hover:text-white hover:bg-slate-800 rounded-lg">Categories</a>
      <a href="/how-it-works" class="block px-3 py-2 text-sm text-slate-300 hover:text-white hover:bg-slate-800 rounded-lg">How It Works</a>
      <a href="/bookings" class="block px-3 py-2 text-sm text-slate-300 hover:text-white hover:bg-slate-800 rounded-lg">My Bookings</a>
      <div class="pt-2">
        <a href="/list-item" class="block text-center bg-orange-500 text-white text-sm font-semibold px-4 py-2.5 rounded-xl">+ List Your Item</a>
      </div>
    </div>
  </div>
</header>
