<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cache List | ${escapedSubdomain}</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f4efe8;
            --panel: rgba(255, 252, 247, 0.92);
            --panel-strong: #fffdf9;
            --line: rgba(93, 71, 52, 0.18);
            --text: #24180f;
            --muted: #716150;
            --accent: #c8643b;
            --accent-deep: #8e3f20;
            --shadow: 0 20px 45px rgba(59, 34, 18, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(239, 176, 121, 0.34), transparent 28rem),
                radial-gradient(circle at bottom right, rgba(149, 188, 201, 0.34), transparent 24rem),
                linear-gradient(180deg, #fbf6ef 0%, var(--bg) 100%);
        }

        a,
        button,
        input {
            font: inherit;
        }

        #app {
            width: min(1120px, calc(100% - 32px));
            margin: 40px auto;
        }

        .page-shell {
            padding: 28px;
            border: 1px solid rgba(255, 255, 255, 0.65);
            border-radius: 28px;
            background: var(--panel);
            backdrop-filter: blur(14px);
            box-shadow: var(--shadow);
        }

        .hero {
            display: flex;
            gap: 20px;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 22px;
        }

        .eyebrow {
            margin: 0 0 10px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--accent-deep);
        }

        h1 {
            margin: 0;
            font-size: clamp(2rem, 4vw, 3.3rem);
            line-height: 0.95;
            letter-spacing: -0.04em;
        }

        .meta {
            margin: 12px 0 0;
            color: var(--muted);
        }

        .toolbar {
            display: flex;
            gap: 16px;
            align-items: end;
            justify-content: space-between;
            margin-bottom: 22px;
            flex-wrap: wrap;
        }

        .toolbar-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .search-field {
            display: grid;
            gap: 8px;
            min-width: min(420px, 100%);
            color: var(--muted);
        }

        .search-field span {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.03em;
        }

        .search-field input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--line);
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.8);
            color: var(--text);
            outline: none;
        }

        .search-field input:focus {
            border-color: rgba(200, 100, 59, 0.55);
            box-shadow: 0 0 0 4px rgba(200, 100, 59, 0.12);
        }

        .refresh-link,
        .show-btn,
        .clear-all-btn,
        .delete-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 0;
            border-radius: 999px;
            text-decoration: none;
            cursor: pointer;
            transition: transform 140ms ease, box-shadow 140ms ease, opacity 140ms ease;
        }

        .refresh-link {
            padding: 13px 18px;
            background: linear-gradient(135deg, var(--accent) 0%, #d78962 100%);
            color: #fffaf6;
            box-shadow: 0 12px 24px rgba(200, 100, 59, 0.24);
        }

        .clear-all-btn {
            padding: 13px 18px;
            background: #24180f;
            color: #fffaf6;
            box-shadow: 0 12px 24px rgba(36, 24, 15, 0.16);
        }

        .delete-btn {
            min-width: 88px;
            padding: 10px 14px;
            background: rgba(200, 100, 59, 0.11);
            color: var(--accent-deep);
        }

        .show-btn {
            min-width: 108px;
            padding: 10px 14px;
            background: rgba(36, 24, 15, 0.08);
            color: var(--text);
        }

        .refresh-link:hover,
        .show-btn:hover,
        .clear-all-btn:hover,
        .delete-btn:hover {
            transform: translateY(-1px);
        }

        .show-btn:disabled,
        .clear-all-btn:disabled,
        .delete-btn:disabled {
            cursor: wait;
            opacity: 0.6;
            transform: none;
        }

        .table-card {
            overflow: hidden;
            border: 1px solid var(--line);
            border-radius: 22px;
            background: var(--panel-strong);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 16px 18px;
            text-align: left;
            border-bottom: 1px solid var(--line);
            vertical-align: top;
        }

        th {
            font-size: 12px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--muted);
        }

        tbody tr:last-child td {
            border-bottom: 0;
        }

        .key-cell code {
            display: inline-block;
            padding: 6px 10px;
            border-radius: 10px;
            background: rgba(36, 24, 15, 0.06);
            font-family: "IBM Plex Mono", "SFMono-Regular", monospace;
            font-size: 13px;
            word-break: break-all;
        }

        .action-column {
            width: 240px;
        }

        .actions-cell {
            width: 240px;
        }

        .row-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end; 
        }

        .empty-state,
        .error-banner {
            padding: 18px 20px;
            border-radius: 18px;
        }

        .empty-state {
            border: 1px dashed var(--line);
            background: rgba(255, 255, 255, 0.72);
            color: var(--muted);
        }

        .error-banner {
            margin-bottom: 18px;
            border: 1px solid rgba(181, 52, 52, 0.18);
            background: rgba(181, 52, 52, 0.08);
            color: #8f1f1f;
        }

        .data-panel {
            margin-top: 20px;
            border: 1px solid var(--line);
            border-radius: 22px;
            background: rgba(255, 255, 255, 0.76);
            overflow: hidden;
        }

        .data-panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 16px 18px;
            border-bottom: 1px solid var(--line);
        }

        .data-panel-header h2 {
            margin: 0;
            font-size: 16px;
        }

        .data-panel-header code {
            display: inline-block;
            margin-top: 6px;
            font-size: 12px;
            color: var(--muted);
            word-break: break-all;
        }

        .data-panel-close {
            border: 0;
            background: transparent;
            color: var(--muted);
            cursor: pointer;
        }

        .data-panel pre {
            margin: 0;
            padding: 18px;
            overflow: auto;
            font-size: 13px;
            line-height: 1.55;
            background: rgba(36, 24, 15, 0.03);
        }

        @media (max-width: 760px) {
            #app {
                width: min(100% - 20px, 100%);
                margin: 18px auto;
            }

            .page-shell {
                padding: 18px;
                border-radius: 22px;
            }

            .hero {
                flex-direction: column;
                align-items: stretch;
            }

            .toolbar {
                align-items: stretch;
            }

            .toolbar-actions {
                width: 100%;
            }

            .clear-all-btn {
                width: 100%;
            }

            .actions-cell,
            .action-column {
                width: auto;
            }

            .row-actions {
                justify-content: flex-start;
            }

            .refresh-link {
                width: 100%;
            }

            th,
            td {
                padding: 14px 12px;
            }
        }
    </style>
</head>

<body>
    <div id="app">
        <div class="page-shell">
            <header class="hero">
                <div>
                    <p class="eyebrow">Cache Inspector</p>
                    <h1>${escapedSubdomain}</h1>
                    <p class="meta">${items.length} of ${items.length} entries shown</p>
                </div>
                <a class="refresh-link" href="/_/clist">Refresh</a>
            </header>

            <section class="toolbar">
                <label class="search-field">
                    <span>Filter cache key</span>
                    <input type="search" placeholder="Search by key" value="" />
                </label>
                <div class="toolbar-actions">
                    <button class="clear-all-btn" type="button">Clear All</button>
                </div>
            </section>

            ${serverTable}
        </div>
    </div>

    <script id="cache-list-template" type="text/x-template">
    <div class="page-shell">
        <header class="hero">
        <div>
            <p class="eyebrow">Cache Inspector</p>
            <h1>{{ subdomain }}</h1>
            <p class="meta">{{ filteredItems.length }} of {{ items.length }} entries shown</p>
        </div>
        <a class="refresh-link" href="/_/clist">Refresh</a>
        </header>

        <p v-if="errorMessage" class="error-banner">{{ errorMessage }}</p>

        <section class="toolbar">
        <label class="search-field">
            <span>Filter cache key</span>
            <input v-model="searchTerm" type="search" placeholder="Search by key" />
        </label>
        <div class="toolbar-actions">
            <button
                class="clear-all-btn"
                type="button"
                :disabled="pendingClearAll || pendingKey !== '' || !items.length"
                @click="clearAll"
            >
                {{ pendingClearAll ? 'Clearing...' : 'Clear All' }}
            </button>
        </div>
        </section>

        <div v-if="filteredItems.length" class="table-card">
        <table>
            <thead>
            <tr>
                <th>Cache key</th>
                <th>Expires at</th>
                <th class="action-column">Action</th>
            </tr>
            </thead>
            <tbody>
            <tr v-for="item in filteredItems" :key="item.key">
                <td class="key-cell"><code>{{ item.displayKey }}</code></td>
                <td>{{ formatExpiresAt(item.expiresAt) }}</td>
                <td class="actions-cell">
                <div class="row-actions">
                    <button
                        class="show-btn"
                        type="button"
                        :disabled="pendingShowKey === item.key || pendingClearAll"
                        @click="showData(item)"
                    >
                        {{ pendingShowKey === item.key ? 'Loading...' : 'Show Data' }}
                    </button>
                    <button
                        class="delete-btn"
                        type="button"
                        :disabled="pendingKey === item.key || pendingClearAll"
                        @click="deleteItem(item)"
                    >
                        {{ pendingKey === item.key ? 'Clearing...' : 'Clear' }}
                    </button>
                </div>
                </td>
            </tr>
            </tbody>
        </table>
        </div>

        <div v-else class="empty-state">
        {{ items.length ? 'No cache entries match the current filter.' : 'No cache entries found for this subdomain.' }}
        </div>

        <section v-if="selectedDataKey" class="data-panel">
            <div class="data-panel-header">
                <div>
                    <h2>Cache Data</h2>
                    <code>{{ selectedDataKey }}</code>
                </div>
                <button class="data-panel-close" type="button" @click="hideData">Close</button>
            </div>
            <pre>{{ selectedDataText }}</pre>
        </section>
    </div>
    </script>

    <script id="cache-list-state" type="application/json">${initialState}</script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script>
        const stateScript = document.getElementById('cache-list-state');
        const initialStateData = JSON.parse(stateScript.textContent || '{"subdomain":"","items":[]}');
        const { createApp } = Vue;

        createApp({
            template: '#cache-list-template',
            data() {
                return {
                    ...initialStateData,
                    errorMessage: '',
                    pendingKey: '',
                    pendingClearAll: false,
                    pendingShowKey: '',
                    searchTerm: '',
                    selectedDataKey: '',
                    selectedDataText: '',
                };
            },
            computed: {
                filteredItems() {
                    const term = this.searchTerm.trim().toLowerCase();
                    if (!term) return this.items;
                    return this.items.filter((item) => (item.displayKey || item.key).toLowerCase().includes(term));
                },
            },
            methods: {
                formatExpiresAt(value) {
                    if (!value || value === 'no-expire') return value || '';

                    const [datePart, timePart] = value.split(' ');
                    if (!datePart || !timePart) return value;

                    const [year, month, day] = datePart.split('-');
                    const [hourText, minuteText] = timePart.split(':');
                    const hour = Number(hourText);
                    const minute = Number(minuteText);

                    if (!year || !month || !day || Number.isNaN(hour) || Number.isNaN(minute)) {
                        return value;
                    }

                    const suffix = hour >= 12 ? 'PM' : 'AM';
                    const formattedHour = String(hour % 12 || 12).padStart(2, '0');
                    const formattedMinute = String(minute).padStart(2, '0');

                    return `${year}-${month}-${day}, ${formattedHour}:${formattedMinute} ${suffix}`;
                },
                async clearAll() {
                    if (!this.clearAllUrl) return;
                    if (!window.confirm('Are you sure?')) return;

                    this.errorMessage = '';
                    this.pendingClearAll = true;

                    try {
                        const response = await fetch(this.clearAllUrl, {
                            headers: { Accept: 'application/json' },
                        });

                        if (!response.ok) {
                            throw new Error('Clear all failed with status ' + response.status);
                        }

                        this.items = [];
                        this.hideData();
                    } catch (error) {
                        this.errorMessage = error instanceof Error ? error.message : 'Failed to clear cache entries.';
                    } finally {
                        this.pendingClearAll = false;
                    }
                },
                async showData(item) {
                    if (!item.dataUrl) return;

                    this.errorMessage = '';
                    this.pendingShowKey = item.key;

                    try {
                        const response = await fetch(item.dataUrl, {
                            headers: { Accept: 'application/json' },
                        });

                        if (!response.ok) {
                            throw new Error('Show data failed with status ' + response.status);
                        }

                        const payload = await response.json();
                        this.selectedDataKey = item.displayKey || item.key;
                        this.selectedDataText = this.stringifyData(payload.data);
                    } catch (error) {
                        this.errorMessage = error instanceof Error ? error.message : 'Failed to load cache data.';
                    } finally {
                        this.pendingShowKey = '';
                    }
                },
                hideData() {
                    this.selectedDataKey = '';
                    this.selectedDataText = '';
                },
                stringifyData(value) {
                    if (typeof value === 'string') return value;
                    if (value === null || value === undefined) return String(value);

                    try {
                        return JSON.stringify(value, null, 2);
                    } catch (_error) {
                        return String(value);
                    }
                },
                async deleteItem(item) {
                    this.errorMessage = '';
                    this.pendingKey = item.key;

                    try {
                        const response = await fetch(item.deleteUrl, {
                            headers: { Accept: 'application/json' },
                        });

                        if (!response.ok) {
                            throw new Error('Clear failed with status ' + response.status);
                        }

                        this.items = this.items.filter((entry) => entry.key !== item.key);
                        if (this.selectedDataKey === (item.displayKey || item.key)) {
                            this.hideData();
                        }
                    } catch (error) {
                        this.errorMessage = error instanceof Error ? error.message : 'Failed to clear cache entry.';
                    } finally {
                        this.pendingKey = '';
                    }
                },
            },
        }).mount('#app');
    </script>
</body>

</html>
