<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RSK Config — API Docs</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }
    header { background: #1a1d27; border-bottom: 1px solid #2d3148; padding: 18px 32px; display: flex; align-items: center; gap: 14px; }
    header h1 { font-size: 1.2rem; font-weight: 700; color: #a5b4fc; }
    header span { font-size: 0.78rem; background: #2d3148; color: #94a3b8; padding: 2px 10px; border-radius: 999px; }
    .layout { display: flex; height: calc(100vh - 57px); }
    nav { width: 220px; flex-shrink: 0; background: #13151f; border-right: 1px solid #2d3148; overflow-y: auto; padding: 16px 0; }
    nav a { display: block; padding: 8px 20px; font-size: 0.85rem; color: #94a3b8; cursor: pointer; border-left: 3px solid transparent; transition: all .15s; text-decoration: none; }
    nav a:hover { color: #e2e8f0; background: #1e2133; }
    nav a.active { color: #a5b4fc; border-left-color: #6366f1; background: #1e2133; }
    nav .section-label { padding: 12px 20px 4px; font-size: 0.7rem; font-weight: 700; color: #4b5563; text-transform: uppercase; letter-spacing: .08em; }
    main { flex: 1; overflow-y: auto; padding: 32px; }
    .card { background: #1a1d27; border: 1px solid #2d3148; border-radius: 10px; margin-bottom: 28px; }
    .card-header { padding: 16px 22px; border-bottom: 1px solid #2d3148; display: flex; align-items: center; gap: 10px; }
    .card-header h2 { font-size: 1rem; font-weight: 700; color: #e2e8f0; }
    .badge { font-size: 0.72rem; padding: 2px 9px; border-radius: 999px; font-weight: 600; }
    .badge-interface { background: #1e3a5f; color: #60a5fa; }
    .badge-enum { background: #2d1b4e; color: #c084fc; }
    .badge-type { background: #1c3529; color: #34d399; }
    .badge-response { background: #3b2204; color: #fb923c; }
    table { width: 100%; border-collapse: collapse; font-size: 0.84rem; }
    th { text-align: left; padding: 10px 22px; color: #6366f1; font-size: 0.75rem; text-transform: uppercase; letter-spacing: .06em; border-bottom: 1px solid #2d3148; }
    td { padding: 10px 22px; border-bottom: 1px solid #1e2133; vertical-align: top; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #1e2133; }
    .field { font-family: 'Courier New', monospace; color: #f472b6; font-size: 0.83rem; }
    .type  { font-family: 'Courier New', monospace; color: #34d399; font-size: 0.82rem; }
    .opt   { color: #6b7280; font-size: 0.75rem; margin-left: 4px; }
    .req   { color: #f87171; font-size: 0.75rem; margin-left: 4px; }
    .desc  { color: #94a3b8; line-height: 1.5; }
    .example-block { padding: 16px 22px; }
    .example-block pre { background: #0d0f18; border: 1px solid #2d3148; border-radius: 8px; padding: 16px; overflow-x: auto; font-size: 0.8rem; color: #a5f3fc; line-height: 1.6; }
    .note { margin: 0 22px 14px; padding: 10px 14px; background: #1c2a1c; border-left: 3px solid #22c55e; border-radius: 4px; font-size: 0.83rem; color: #86efac; }
    .warn { margin: 0 22px 14px; padding: 10px 14px; background: #2a1c0e; border-left: 3px solid #f97316; border-radius: 4px; font-size: 0.83rem; color: #fdba74; }
    h3.sub { padding: 16px 22px 8px; font-size: 0.9rem; color: #a5b4fc; }
  </style>
</head>
<body>
<div id="app">
  <header>
    <a href="/_" style="display:flex;align-items:center;gap:6px;font-size:0.82rem;color:#6366f1;text-decoration:none;padding:5px 10px;border:1px solid #2d3148;border-radius:6px;transition:background .15s;" onmouseover="this.style.background='#1e2133'" onmouseout="this.style.background='transparent'">&#8592; Back</a>
    <h1>RSK Config Docs</h1>
    <span>GET /rsk-configs</span>
    <span style="margin-left:auto;font-size:0.72rem;color:#4b5563;">Updated: <span data-generated>—</span></span>
  </header>
  <div class="layout">
    <nav>
      <div class="section-label">Response Shape</div>
      <a :class="{active: active==='response'}" @click="active='response'">Response Envelope</a>
      <div class="section-label">Interfaces</div>
      <a :class="{active: active==='RskRoute'}" @click="active='RskRoute'">RskRoute</a>
      <a :class="{active: active==='Component'}" @click="active='Component'">Component</a>
      <a :class="{active: active==='RskOptionalConfigs'}" @click="active='RskOptionalConfigs'">RskOptionalConfigs</a>
      <div class="section-label">Types</div>
      <a :class="{active: active==='Slots'}" @click="active='Slots'">Slots (enum)</a>
      <a :class="{active: active==='Redirections'}" @click="active='Redirections'">Redirections</a>
      <div class="section-label">Examples</div>
      <a :class="{active: active==='example'}" @click="active='example'">Full Example</a>
    </nav>

    <main>

      <!-- Response Envelope -->
      <template v-if="active==='response'">
        <div class="card">
          <div class="card-header">
            <h2>Response Envelope</h2>
            <span class="badge badge-response">API Response</span>
          </div>
          <table>
            <tr><th>Field</th><th>Type</th><th>Description</th></tr>
            <tr>
              <td><span class="field">status</span> <span class="req">required</span></td>
              <td><span class="type">string</span></td>
              <td class="desc">"success" or "error"</td>
            </tr>
            <tr>
              <td><span class="field">result.data.routes</span> <span class="req">required</span></td>
              <td><span class="type">RskRoute[]</span></td>
              <td class="desc">Array of route definitions for the store</td>
            </tr>
            <tr>
              <td><span class="field">result.data.redirections</span> <span class="opt">optional</span></td>
              <td><span class="type">Redirections</span></td>
              <td class="desc">Array of <code>[from, to]</code> redirect pairs</td>
            </tr>
            <tr>
              <td><span class="field">result.data.config</span> <span class="opt">optional</span></td>
              <td><span class="type">RskOptionalConfigs</span></td>
              <td class="desc">Store-wide config (layout, CSS, scripts)</td>
            </tr>
          </table>
        </div>
      </template>

      <!-- RskRoute -->
      <template v-if="active==='RskRoute'">
        <div class="card">
          <div class="card-header">
            <h2>RskRoute</h2>
            <span class="badge badge-interface">interface</span>
          </div>
          <table>
            <tr><th>Field</th><th>Type</th><th>Description</th></tr>
            <tr>
              <td><span class="field">page_key</span> <span class="req">required</span></td>
              <td><span class="type">string</span></td>
              <td class="desc">Unique page identifier — matches <code>EnumPageKeys</code> values (e.g. <code>home</code>, <code>products_list</code>, <code>not_found</code>)</td>
            </tr>
            <tr>
              <td><span class="field">route_path</span> <span class="req">required</span></td>
              <td><span class="type">string</span></td>
              <td class="desc">URL path. Must start with <code>/</code>. Supports Express-style params: <code>/products/:url</code>, <code>/categories/:uuid</code></td>
            </tr>
            <tr>
              <td><span class="field">content_path</span> <span class="opt">optional</span></td>
              <td><span class="type">string</span></td>
              <td class="desc">API path or local file path used to load page content</td>
            </tr>
            <tr>
              <td><span class="field">content_source</span> <span class="opt">optional</span></td>
              <td><span class="type">'file' | 'api'</span></td>
              <td class="desc"><code>'file'</code> — reads from <code>public/</code> folder. <code>'api'</code> — fetches from external API</td>
            </tr>
            <tr>
              <td><span class="field">layout</span> <span class="opt">optional</span></td>
              <td><span class="type">string | null</span></td>
              <td class="desc">Layout template name (e.g. <code>camping</code>, <code>clothing</code>). Overrides store-level <code>config.layout</code>. Falls back to <code>default</code></td>
            </tr>
            <tr>
              <td><span class="field">components</span> <span class="opt">optional</span></td>
              <td><span class="type">Component[]</span></td>
              <td class="desc">Slot-based components to inject into <code>data-slot</code> placeholders in the layout HTML</td>
            </tr>
            <tr>
              <td><span class="field">css</span> <span class="opt">optional</span></td>
              <td><span class="type">string[]</span></td>
              <td class="desc">Route-specific stylesheet URLs appended to <code>&lt;head&gt;</code></td>
            </tr>
            <tr>
              <td><span class="field">scripts</span> <span class="opt">optional</span></td>
              <td><span class="type">string[]</span></td>
              <td class="desc">Route-specific script URLs appended to <code>&lt;body&gt;</code></td>
            </tr>
            <tr>
              <td><span class="field">custom_css</span> <span class="opt">optional</span></td>
              <td><span class="type">string</span></td>
              <td class="desc">Inline CSS injected as a <code>&lt;style&gt;</code> block in <code>&lt;head&gt;</code></td>
            </tr>
            <tr>
              <td><span class="field">custom_js</span> <span class="opt">optional</span></td>
              <td><span class="type">string</span></td>
              <td class="desc">Inline JS injected as a <code>&lt;script&gt;</code> block at end of <code>&lt;body&gt;</code></td>
            </tr>
          </table>
        </div>
        <div class="note">Route-level <code>css</code>, <code>scripts</code>, <code>custom_css</code>, <code>custom_js</code> are applied <strong>after</strong> store-wide <code>RskOptionalConfigs</code>, so they take precedence.</div>
      </template>

      <!-- Component -->
      <template v-if="active==='Component'">
        <div class="card">
          <div class="card-header">
            <h2>Component</h2>
            <span class="badge badge-interface">interface</span>
          </div>
          <table>
            <tr><th>Field</th><th>Type</th><th>Description</th></tr>
            <tr>
              <td><span class="field">slot</span> <span class="opt">optional</span></td>
              <td><span class="type">Slots</span></td>
              <td class="desc">Target slot name — matches <code>data-slot="NAME"</code> attribute in the layout HTML</td>
            </tr>
            <tr>
              <td><span class="field">files</span> <span class="opt">optional</span></td>
              <td><span class="type">string[]</span></td>
              <td class="desc">
                Ordered list of component file paths to try. First file that exists wins.<br/>
                Resolved from <code>public/layouts/components/{layout}/{file}</code>.<br/><br/>
                Accepted formats: <code>slider</code> · <code>slider.html</code> · <code>/slider</code> · <code>/slider.html</code> · <code>blogs/post1</code>
              </td>
            </tr>
          </table>
        </div>
        <div class="note">The renderer replaces each <code>&lt;div data-slot="NAME"&gt;&lt;/div&gt;</code> in the layout with the first resolvable file from all matching <code>Component</code> entries for that slot name.</div>
      </template>

      <!-- RskOptionalConfigs -->
      <template v-if="active==='RskOptionalConfigs'">
        <div class="card">
          <div class="card-header">
            <h2>RskOptionalConfigs</h2>
            <span class="badge badge-interface">interface</span>
          </div>
          <table>
            <tr><th>Field</th><th>Type</th><th>Description</th></tr>
            <tr>
              <td><span class="field">layout</span> <span class="opt">optional</span></td>
              <td><span class="type">string</span></td>
              <td class="desc">Default layout for all routes in this store. Can be overridden per-route via <code>RskRoute.layout</code></td>
            </tr>
            <tr>
              <td><span class="field">css</span> <span class="opt">optional</span></td>
              <td><span class="type">string[]</span></td>
              <td class="desc">Store-wide stylesheet URLs appended to <code>&lt;head&gt;</code> on every page</td>
            </tr>
            <tr>
              <td><span class="field">scripts</span> <span class="opt">optional</span></td>
              <td><span class="type">string[]</span></td>
              <td class="desc">Store-wide script URLs appended to <code>&lt;body&gt;</code> on every page</td>
            </tr>
            <tr>
              <td><span class="field">custom_css</span> <span class="opt">optional</span></td>
              <td><span class="type">string</span></td>
              <td class="desc">Inline CSS injected as a <code>&lt;style&gt;</code> block in <code>&lt;head&gt;</code> on every page</td>
            </tr>
            <tr>
              <td><span class="field">custom_js</span> <span class="opt">optional</span></td>
              <td><span class="type">string</span></td>
              <td class="desc">Inline JS injected as a <code>&lt;script&gt;</code> block at end of <code>&lt;body&gt;</code> on every page</td>
            </tr>
            <tr>
              <td><span class="field">body_css</span> <span class="opt">optional</span></td>
              <td><span class="type">string | string[]</span></td>
              <td class="desc">CSS class(es) added to <code>&lt;body&gt;</code> on every page. Can be a space-separated string or an array</td>
            </tr>
          </table>
        </div>
        <div class="warn">Store-wide config is applied first. Route-level fields then override/extend on top.</div>
      </template>

      <!-- Slots enum -->
      <template v-if="active==='Slots'">
        <div class="card">
          <div class="card-header">
            <h2>Slots</h2>
            <span class="badge badge-enum">enum</span>
          </div>
          <table>
            <tr><th>Value</th><th>HTML Attribute</th><th>Description</th></tr>
            <tr>
              <td><span class="field">top</span></td>
              <td><span class="type">data-slot="top"</span></td>
              <td class="desc">Slot rendered above <code>#default_page_contents</code></td>
            </tr>
            <tr>
              <td><span class="field">bottom</span></td>
              <td><span class="type">data-slot="bottom"</span></td>
              <td class="desc">Slot rendered below <code>#default_page_contents</code></td>
            </tr>
          </table>
        </div>
        <div class="note">In the layout HTML, place <code>&lt;div data-slot="top"&gt;&lt;/div&gt;</code> where you want the component injected. The slot div is fully replaced with the component file's contents.</div>
      </template>

      <!-- Redirections -->
      <template v-if="active==='Redirections'">
        <div class="card">
          <div class="card-header">
            <h2>Redirections</h2>
            <span class="badge badge-type">type</span>
          </div>
          <div class="example-block">
            <pre>type Redirections = [string, string][]

// Each entry: [from, to]
// "from" can include query params for exact matching
// "to" is the destination path (leading "/" added automatically)</pre>
          </div>
          <table>
            <tr><th>Position</th><th>Description</th></tr>
            <tr>
              <td><span class="field">[0] from</span></td>
              <td class="desc">Source path, optionally with query string: <code>/old-page</code> or <code>/old-page?ref=email</code></td>
            </tr>
            <tr>
              <td><span class="field">[1] to</span></td>
              <td class="desc">Destination path: <code>/new-page</code> or <code>new-page</code> (leading slash added if missing)</td>
            </tr>
          </table>
        </div>
        <div class="note">Query-param matching: if the request query exactly matches the <code>from</code> query string, that entry takes priority. Otherwise falls back to the first path-only match.</div>
      </template>

      <!-- Full Example -->
      <template v-if="active==='example'">
        <div class="card">
          <div class="card-header">
            <h2>Full Example Response</h2>
            <span class="badge badge-response">JSON</span>
          </div>
          <div class="example-block">
            <pre>{{ example }}</pre>
          </div>
        </div>
      </template>

    </main>
  </div>
</div>

<script>
const { createApp, ref } = Vue;
createApp({
  setup() {
    const active = ref('response');
    const example = ref(JSON.stringify({
      status: "success",
      result: {
        data: {
          routes: [
            {
              page_key: "home",
              route_path: "/",
              content_path: "/pages/contents?source=online",
              layout: "camping",
              components: [
                { slot: "top",    files: ["slider", "camping/slider"] },
                { slot: "bottom", files: ["newsletter"] }
              ],
              css: ["https://cdn.example.com/theme.css"],
              custom_css: "body { background: #f5f5f5; }"
            },
            {
              page_key: "products_list",
              route_path: "/products"
            },
            {
              page_key: "product_details",
              route_path: "/products/:url"
            },
            {
              page_key: "not_found",
              route_path: "/404"
            }
          ],
          redirections: [
            ["/old-home", "/"],
            ["/sale?ref=email", "/products?category=sale"]
          ],
          config: {
            layout: "default",
            css: ["https://cdn.example.com/global.css"],
            scripts: ["https://cdn.example.com/analytics.js"],
            custom_css: "* { box-sizing: border-box; }",
            custom_js: "console.log('store loaded');",
            body_css: "theme-light font-sans"
          }
        }
      }
    }, null, 2));
    return { active, example };
  }
}).mount('#app');
</script>
</body>
</html>
