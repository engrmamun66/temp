<main class="my-5 container">

                            </button>
                            <button type="button" class="WishlistCopyBtn" data-rentmyattr="WishlistCopyBtn">

                                    </a>
                                    <div class="WishlistOverlow transition">

                                            <button class="WishlistDeleteBtn" data-rentmyattr="WishlistDeleteBtn"><i class="la la-trash"></i></button>
                                            <!-- <div class="WishlistQuantity">
                                                <div class="QuantytyBox" data-rentmyattr="QuantytyBox">
                                                    <span class="WishlistMunisBtn" data-rentmyattr="WishlistMunisBtn">-</span>

                                                    <span class="WishlistPlusBtn" data-rentmyattr="WishlistPlusBtn">+</span>
                                                </div>
                                            </div> -->
                                        </div>
                                    </div>
                                </div>
                                <div class="WishlistBody wishlist-body">
                                    <a data-rentmyattr="ProductFullUrl"  href="#"><h3 class="WishlistProductName" data-rentmyattr="WishlistProductName">Black Fernanda</h3></a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
  
                <div class="WishlistButtonArea">
                    <button class="WishlistContinueBtn" data-rentmyattr="BtnContinueShipping">Continue Shopping</button>

                    <div class="WishlistTitleRightArea WishlistMobileBtnArea">
                      <button type="button" class="WishlistSaveBtn" data-rentmyattr="WishlistSaveBtn">
                          <i class="la la-floppy-o"></i>
                          <span class="tooltip__text tooltip__text--top"> Save wish list </span>
                      </button>
                      <button type="button" class="WishlistCopyBtn" data-rentmyattr="WishlistCopyBtn">
                          <i class="la la-copy"></i>
                          <span class="tooltip__text tooltip__text--top"> Copy wish list link </span>

                    </div>

            </div>
