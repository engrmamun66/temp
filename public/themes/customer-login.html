<main class="position-relative"> 
  <section class="rentmy-innerpage-banner">
        <div class="hero-overlay"></div>
        <div class="rentmy-innerpage-overlay">
            <div class="container">
                <div class="container-inner">
                    <div class="container-inner-overlay">

                        <div class="row">
                            <div class="col-md-12">
                                <div class="rentmy-innerpage-body">
                                    <div class="rentmy-innerpage-body-inner">
                                        <h1>Customer Login</h1>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
<div id="RentMyCustomerLoginContainer" class="RentMyWrapper">
    <div class="LoginElement">
        <h3 class="LoginTitle">Already Registered?</h3>
        <div class="RentMyAlertMessage"></div>
        <form class="RentMyFrom" id="RentMyCustomerLoginForm">
            <div class="RentMyInputGroup">
                <input type="text" name="email" class="RentMyInputField" placeholder="Email" />
            </div>
            <div class="RentMyInputGroup">
                <input type="password" name="password" class="RentMyInputField" placeholder="Password" />
                <button class="AuthEyeIcon" type="button">
                    <i class="fa fa-eye-slash" data-rentmyattr="TogglePassword"></i>
                </button>
            </div>
            <div class="RentMyButtonGroup">
                <button type="submit" class="RentMyBtn LoginBtn">Log in</button>
                <div class="RentMyButtonGroup">
                    <a href="#" class="ForgotPassword" RentMyPageLink="reset_password">Forgot Password?</a>
                    <a href="#" class="NewAccount" RentMyPageLink="registration">Sign Up</a>
                </div>
            </div>
        </form>
    </div>
</div>



</main>
