<div id="RentMyCustomerChangePasswordContainer" class="RentMyWrapper RentMyCustomerPortalWrapper">
    <div class="RentMyCustomPortalRow">
        <div class="RentMyLeftSidebarmenu">
            <div class="RentMyLeftSidebarmenuInner" data-rentmyattr="SideBar">
                <div class="RentMyProfileImge">
                    <img src="" alt="" data-rentmyattr="ProfileImage">
                </div>
                <h5 class="RentMyProfileName" data-rentmyattr="customer_name">{{ customer_name }}</h5>
                <div class="RentMySideMenu">
                    <ul>
                        <li><a data-rentmyattr="RentMyPageLink=customer_profile">Profile</a></li>
                        <li><a data-rentmyattr="RentMyPageLink=customer_change_password" class="active">Change Password</a></li>
                        <li><a data-rentmyattr="RentMyPageLink=customer_change_avatar">Change Avatar</a></li>
                        <li><a data-rentmyattr="RentMyPageLink=customer_order_history">Order History</a></li>
                        <li data-rentmyattr="DashboardNav"><a RentMyPageLink="customer_order_dashboard">Dashboard</a></li>
                        <li data-rentmyattr="BillingNav"><a RentMyPageLink="customer_billing">Billing</a></li>
                        <li><a class="rentmy_logout_btn">Logout</a></li>
                    </ul>
                </div>
            </div>
        </div>
        <div class="RentMyRightContent">
            <div class="RentMyPageHeader">
                <h3>Change Password</h3>
                <div class="RentMyPageHeaderRightSide"> </div>
            </div>
            <div class="RentMyContentBody">
                <div class="RentMyContentBodyInner RentMyContentBodyInner__modify">
                    <form id="RentMyChangePasswordForm">
                        <div class="RentMyRow">
                        <div class="RentMyAlertMessage RentMyFullwidth"></div>
                            <div class="RentMyInputGroup RentMyFullwidth">
                                <label for="old_password">Old Password</label>
                                <input type="password" class="RentMyInputField" name="old_password" id="old_password">
                            </div>
                            <div class="RentMyInputGroup RentMyFullwidth">
                                <label for="password">New Password</label>
                                <input type="password" class="RentMyInputField" name="password" id="password">
                            </div>
                            <div class="RentMyInputGroup RentMyFullwidth">
                                <label for="confirm_password">Confirm Password</label>
                                <input type="password" class="RentMyInputField" name="confirm_password" id="confirm_password">
                            </div>
                            <div class="RentMyButtonGroup RentMyNotBetween">
                                <button id="RentMyChangePasswordSubmit" type="button" class="RentMyBtn RentMyPassSubmitBtn">Submit</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
